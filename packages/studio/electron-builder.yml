appId: com.hintos.studio
productName: HintOS Studio
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.eslintrc.*,.prettierrc.*,README.md}'
extraResources:
  - from: '../../packages/core/genres'
    to: 'genres'
    filter:
      - '*.md'
win:
  executableName: HintOS Studio
  target:
    - nsis
nsis:
  artifactName: HintOS-Studio-${version}-setup.${ext}
  shortcutName: HintOS Studio
  uninstallDisplayName: HintOS Studio
  createDesktopShortcut: always
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
