<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .progress-container {
            width: 300px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin: 0 auto;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .loading-text {
            margin-top: 20px;
            font-size: 14px;
            color: #999;
        }

        .version {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo">
            <img src="../logo.png" alt="Logo">
        </div>
        <h1>AI小说生成器</h1>
        <div class="subtitle">智能创作，无限可能</div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div class="loading-text">正在加载中...</div>
        <div class="version" id="version">v1.0.0</div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        
        const progressBar = document.querySelector('.progress-bar');
        const loadingText = document.querySelector('.loading-text');
        
        // 监听启动进度更新
        ipcRenderer.on('splash-progress', (event, data) => {
            const { progress, message } = data;
            progressBar.style.width = `${progress}%`;
            loadingText.textContent = message;
        });
        
        // 获取版本信息
        ipcRenderer.invoke('get-version').then(verData => {
            if (verData && verData.version) {
                document.getElementById('version').textContent = `v${verData.version}`;
            }
        });
    </script>
</body>
</html>
